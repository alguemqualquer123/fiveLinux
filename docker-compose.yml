version: '3.8'

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app
    command: bash -c "cd build && cmake .. -DCMAKE_BUILD_TYPE=Debug -DFML_BUILD_CLI=ON -DFML_BUILD_TESTS=ON && make -j$(nproc) && ctest --output-on-failure"

  run:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - builder
    command: fivem-linux --help

  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app
    working_dir: /app/build
    command: bash

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app
    working_dir: /app/build
    command: bash -c "cmake .. -DCMAKE_BUILD_TYPE=Debug -DFML_BUILD_TESTS=ON && make -j$(nproc) && ctest --output-on-failure"
